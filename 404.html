<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found | Afrorama</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .nf-wrap {
      min-height: calc(100vh - var(--nav-h));
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px; background: #F6F5F2;
    }
    .nf-card {
      background: var(--white); border: 2.5px solid var(--dark);
      border-radius: var(--radius-xl); max-width: 460px; width: 100%;
      box-shadow: 6px 6px 0 var(--dark); overflow: hidden; text-align: center;
    }
    .nf-card-head { background: var(--dark); padding: 36px 28px; border-bottom: 2px solid var(--dark); }
    .nf-card-head .nf-num {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 4.5rem; letter-spacing: .06em; line-height: 1;
      color: var(--yellow); text-shadow: 3px 3px 0 rgba(0,0,0,.3);
    }
    .nf-card-head h1 {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 1.6rem; letter-spacing: .04em; text-transform: uppercase;
      color: var(--white); margin-top: 6px;
    }
    .nf-card-body { padding: 28px; }
    .nf-card-body p { color: var(--gray-dark); margin-bottom: 22px; line-height: 1.65; }
  </style>
</head>
<body>
<nav class="nav" id="main-nav">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">
      <img src="assets/logo-icon.svg" class="nav-logo-icon" alt="" aria-hidden="true">
      <span class="nav-logo-text">afrorama</span>
    </a>
  </div>
</nav>
<div class="nf-wrap">
  <div class="nf-card">
    <div class="nf-card-head">
      <div class="nf-num">404</div>
      <h1>Page not found</h1>
    </div>
    <div class="nf-card-body">
      <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <a href="opportunities.html" class="btn btn-primary"  style="justify-content:center;">Browse opportunities</a>
        <a href="cv-analyser.html"   class="btn btn-yellow"   style="justify-content:center;">No Wahala CV Booster</a>

</div>
<script src="js/main.js"></script>
