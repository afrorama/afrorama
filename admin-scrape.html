<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrape & Publish — Afrorama Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="css/main.css">
<style>
  body { background: var(--gray-light, #F6F5F2); }
  .admin-wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }
  .admin-card { background: #fff; border: 2.5px solid var(--dark); border-radius: 16px; padding: 28px; margin-bottom: 24px; }
  .admin-card h3 { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 1.2rem; letter-spacing: .04em; margin-bottom: 14px; }
  .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .fg .s2 { grid-column: 1 / -1; }
  .form-group label { font-size: .8rem; font-weight: 700; display: block; margin-bottom: 4px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-mid, #ddd); border-radius: 8px; font-size: .9rem; font-family: inherit; }
  .form-textarea { resize: vertical; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 100px; border: 2px solid var(--dark); font-weight: 700; cursor: pointer; font-size: .88rem; }
  .btn-primary { background: var(--yellow, #FFE400); color: var(--dark); }
  .btn-primary:disabled { opacity: .5; cursor: default; }
  .status-msg { font-size: .85rem; margin-top: 10px; }
  .status-msg.error { color: #c0392b; }
  .status-msg.success { color: #1a7d3f; }
  #login-screen { max-width: 360px; margin: 80px auto; }
</style>
</head>
<body>

<div class="admin-wrap">

  <div id="login-screen" class="admin-card">
    <h3>Admin login</h3>
    <div class="form-group">
      <label for="admin-pass">Password</label>
      <input class="form-input" id="admin-pass" type="password" placeholder="Enter admin password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:14px;" id="btn-login">Enter admin</button>
  </div>

  <div id="main-screen" style="display:none;">
    <h2 style="font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:.04em;margin-bottom:20px;">Scrape &amp; Publish</h2>

    <div class="admin-card">
      <h3>1. Paste a job posting URL</h3>
      <div class="form-group">
        <input class="form-input" id="scrape-url" type="url" placeholder="https://example.org/careers/programme-officer">
      </div>
      <button class="btn btn-primary" id="btn-scrape" style="margin-top:10px;">Scrape &amp; format with Claude</button>
      <div class="status-msg" id="scrape-status"></div>
      <p style="font-size:.8rem;margin-top:14px;color:var(--gray-dark);">Some sites (LinkedIn, sites behind a login, PDFs) can't be scraped automatically. <a href="#" id="btn-skip-scrape" style="text-decoration:underline;">Skip this step and fill in the form manually instead →</a></p>
    </div>

    <div class="admin-card" id="review-card" style="display:none;">
      <h3>2. Review &amp; edit before publishing</h3>
      <div class="fg">
        <div class="form-group s2">
          <label for="f-title">Job title *</label>
          <input class="form-input" id="f-title" type="text">
        </div>
        <div class="form-group">
          <label for="f-org">Organisation *</label>
          <input class="form-input" id="f-org" type="text">
        </div>
        <div class="form-group">
          <label for="f-type">Type *</label>
          <select class="form-select" id="f-type">
            <option value="jobs">Job</option>
            <option value="internship">Internship / Volunteering</option>
            <option value="consultancy">Consultancy / Research</option>
            <option value="capacity">Capacity Building / Funding</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-sector">Sector *</label>
          <select class="form-select" id="f-sector"></select>
        </div>
        <div class="form-group">
          <label for="f-location">City / Location *</label>
          <input class="form-input" id="f-location" type="text">
        </div>
        <div class="form-group">
          <label for="f-country">Country *</label>
          <select class="form-select" id="f-country"></select>
        </div>
        <div class="form-group">
          <label for="f-deadline">Deadline</label>
          <input class="form-input" id="f-deadline" type="date">
        </div>
        <div class="form-group">
          <label for="f-salary">Salary / Stipend</label>
          <input class="form-input" id="f-salary" type="text">
        </div>
        <div class="form-group s2">
          <label for="f-apply">Apply URL *</label>
          <input class="form-input" id="f-apply" type="url">
        </div>
        <div class="form-group s2">
          <label for="f-how-to-apply">How to apply (optional — for non-standard cases, e.g. "Email your CV to x@y.org" or "Comment on the LinkedIn post")</label>
          <input class="form-input" id="f-how-to-apply" type="text" placeholder="Leave blank if Apply URL leads straight to an application form">
        </div>
        <div class="form-group s2">
          <label for="f-desc">Description</label>
          <textarea class="form-textarea" id="f-desc" rows="4"></textarea>
        </div>
        <div class="form-group s2">
          <label for="f-req">Requirements</label>
          <textarea class="form-textarea" id="f-req" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="f-contact">Contact email (optional)</label>
          <input class="form-input" id="f-contact" type="email">
        </div>
        <div class="form-group" style="display:flex;align-items:center;">
          <label style="display:flex;align-items:center;gap:8px;margin-top:18px;cursor:pointer;">
            <input type="checkbox" id="f-paid"> Mark as Featured
          </label>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-publish" style="margin-top:16px;">Publish to live site</button>
      <div class="status-msg" id="publish-status"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/data.js"></script>
<script src="js/supabase.js"></script>
<script>
(function () {
  const ADMIN_PASSWORD = 'ETaylor@2026!';
  const ADMIN_KEY = 'afrorama_admin_scrape_session';
  const FN_BASE = 'https://vqchwioyhyiuunpyildz.supabase.co/functions/v1';
  const ANON_KEY = 'sb_publishable_HeGZfQZEDI_IR46a2Ezp-Q_tIUdhF6_';

  const { SECTORS, AFRICAN_COUNTRIES } = window.AfroramaData;

  // Non-African countries, grouped by continent — for HQ-based or
  // international postings (e.g. AFD/Expertise France roles based in
  // Paris) that the African-only automated scrapers filter out.
  const WORLD_COUNTRIES_BY_CONTINENT = {
    'Europe': [
      {id:'AL',name:'Albania'},{id:'AD',name:'Andorra'},{id:'AT',name:'Austria'},{id:'BY',name:'Belarus'},
      {id:'BE',name:'Belgium'},{id:'BA',name:'Bosnia & Herzegovina'},{id:'BG',name:'Bulgaria'},{id:'HR',name:'Croatia'},
      {id:'CY',name:'Cyprus'},{id:'CZ',name:'Czechia'},{id:'DK',name:'Denmark'},{id:'EE',name:'Estonia'},
      {id:'FI',name:'Finland'},{id:'FR',name:'France'},{id:'DE',name:'Germany'},{id:'GR',name:'Greece'},
      {id:'HU',name:'Hungary'},{id:'IS',name:'Iceland'},{id:'IE',name:'Ireland'},{id:'IT',name:'Italy'},
      {id:'XK',name:'Kosovo'},{id:'LV',name:'Latvia'},{id:'LI',name:'Liechtenstein'},{id:'LT',name:'Lithuania'},
      {id:'LU',name:'Luxembourg'},{id:'MT',name:'Malta'},{id:'MD',name:'Moldova'},{id:'MC',name:'Monaco'},
      {id:'ME',name:'Montenegro'},{id:'NL',name:'Netherlands'},{id:'MK',name:'North Macedonia'},{id:'NO',name:'Norway'},
      {id:'PL',name:'Poland'},{id:'PT',name:'Portugal'},{id:'RO',name:'Romania'},{id:'RU',name:'Russia'},
      {id:'SM',name:'San Marino'},{id:'RS',name:'Serbia'},{id:'SK',name:'Slovakia'},{id:'SI',name:'Slovenia'},
      {id:'ES',name:'Spain'},{id:'SE',name:'Sweden'},{id:'CH',name:'Switzerland'},{id:'UA',name:'Ukraine'},
      {id:'GB',name:'United Kingdom'},{id:'VA',name:'Vatican City'},
    ],
    'Asia': [
      {id:'AF',name:'Afghanistan'},{id:'AM',name:'Armenia'},{id:'AZ',name:'Azerbaijan'},{id:'BH',name:'Bahrain'},
      {id:'BD',name:'Bangladesh'},{id:'BT',name:'Bhutan'},{id:'BN',name:'Brunei'},{id:'KH',name:'Cambodia'},
      {id:'CN',name:'China'},{id:'GE',name:'Georgia'},{id:'IN',name:'India'},{id:'ID',name:'Indonesia'},
      {id:'IR',name:'Iran'},{id:'IQ',name:'Iraq'},{id:'IL',name:'Israel'},{id:'JP',name:'Japan'},
      {id:'JO',name:'Jordan'},{id:'KZ',name:'Kazakhstan'},{id:'KW',name:'Kuwait'},{id:'KG',name:'Kyrgyzstan'},
      {id:'LA',name:'Laos'},{id:'LB',name:'Lebanon'},{id:'MY',name:'Malaysia'},{id:'MV',name:'Maldives'},
      {id:'MN',name:'Mongolia'},{id:'MM',name:'Myanmar'},{id:'NP',name:'Nepal'},{id:'KP',name:'North Korea'},
      {id:'OM',name:'Oman'},{id:'PK',name:'Pakistan'},{id:'PS',name:'Palestine'},{id:'PH',name:'Philippines'},
      {id:'QA',name:'Qatar'},{id:'SA',name:'Saudi Arabia'},{id:'SG',name:'Singapore'},{id:'KR',name:'South Korea'},
      {id:'LK',name:'Sri Lanka'},{id:'SY',name:'Syria'},{id:'TW',name:'Taiwan'},{id:'TJ',name:'Tajikistan'},
      {id:'TH',name:'Thailand'},{id:'TL',name:'Timor-Leste'},{id:'TR',name:'Türkiye'},{id:'TM',name:'Turkmenistan'},
      {id:'AE',name:'United Arab Emirates'},{id:'UZ',name:'Uzbekistan'},{id:'VN',name:'Vietnam'},{id:'YE',name:'Yemen'},
    ],
    'North America': [
      {id:'AG',name:'Antigua & Barbuda'},{id:'BS',name:'Bahamas'},{id:'BB',name:'Barbados'},{id:'BZ',name:'Belize'},
      {id:'CA',name:'Canada'},{id:'CR',name:'Costa Rica'},{id:'CU',name:'Cuba'},{id:'DM',name:'Dominica'},
      {id:'DO',name:'Dominican Republic'},{id:'SV',name:'El Salvador'},{id:'GD',name:'Grenada'},{id:'GT',name:'Guatemala'},
      {id:'HT',name:'Haiti'},{id:'HN',name:'Honduras'},{id:'JM',name:'Jamaica'},{id:'MX',name:'Mexico'},
      {id:'NI',name:'Nicaragua'},{id:'PA',name:'Panama'},{id:'KN',name:'Saint Kitts & Nevis'},{id:'LC',name:'Saint Lucia'},
      {id:'VC',name:'Saint Vincent & the Grenadines'},{id:'TT',name:'Trinidad & Tobago'},{id:'US',name:'United States'},
    ],
    'South America': [
      {id:'AR',name:'Argentina'},{id:'BO',name:'Bolivia'},{id:'BR',name:'Brazil'},{id:'CL',name:'Chile'},
      {id:'CO',name:'Colombia'},{id:'EC',name:'Ecuador'},{id:'GY',name:'Guyana'},{id:'PY',name:'Paraguay'},
      {id:'PE',name:'Peru'},{id:'SR',name:'Suriname'},{id:'UY',name:'Uruguay'},{id:'VE',name:'Venezuela'},
    ],
    'Oceania': [
      {id:'AU',name:'Australia'},{id:'FJ',name:'Fiji'},{id:'KI',name:'Kiribati'},{id:'MH',name:'Marshall Islands'},
      {id:'FM',name:'Micronesia'},{id:'NR',name:'Nauru'},{id:'NZ',name:'New Zealand'},{id:'PW',name:'Palau'},
      {id:'PG',name:'Papua New Guinea'},{id:'WS',name:'Samoa'},{id:'SB',name:'Solomon Islands'},{id:'TO',name:'Tonga'},
      {id:'TV',name:'Tuvalu'},{id:'VU',name:'Vanuatu'},
    ],
  };

  function populateSelects() {
    const sectorSel = document.getElementById('f-sector');
    SECTORS.forEach(s => sectorSel.insertAdjacentHTML('beforeend', `<option value="${s}">${s}</option>`));

    const countrySel = document.getElementById('f-country');
    const africaGroup = document.createElement('optgroup');
    africaGroup.label = 'Africa';
    AFRICAN_COUNTRIES.slice().sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
      africaGroup.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.name}</option>`);
    });
    countrySel.appendChild(africaGroup);

    Object.entries(WORLD_COUNTRIES_BY_CONTINENT).forEach(([continent, countries]) => {
      const group = document.createElement('optgroup');
      group.label = continent;
      countries.slice().sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
        group.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.name}</option>`);
      });
      countrySel.appendChild(group);
    });
  }

  function showMain() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    populateSelects();
  }

  if (sessionStorage.getItem(ADMIN_KEY) === '1') showMain();

  document.getElementById('btn-login').addEventListener('click', () => {
    const pass = document.getElementById('admin-pass').value;
    if (pass === ADMIN_PASSWORD) { sessionStorage.setItem(ADMIN_KEY, '1'); showMain(); }
    else alert('Incorrect password.');
  });
  document.getElementById('admin-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-login').click(); });

  function matchCountry(nameGuess) {
    if (!nameGuess) return '';
    const lower = nameGuess.toLowerCase();
    const allCountries = [...AFRICAN_COUNTRIES, ...Object.values(WORLD_COUNTRIES_BY_CONTINENT).flat()];
    const exact = allCountries.find(c => c.name.toLowerCase() === lower);
    if (exact) return exact.id;
    const partial = allCountries.find(c => lower.includes(c.name.toLowerCase()) || c.name.toLowerCase().includes(lower));
    return partial ? partial.id : '';
  }

  const scrapeStatus = document.getElementById('scrape-status');
  document.getElementById('btn-scrape').addEventListener('click', async () => {
    const url = document.getElementById('scrape-url').value.trim();
    if (!url) { scrapeStatus.textContent = 'Paste a URL first.'; scrapeStatus.className = 'status-msg error'; return; }

    scrapeStatus.textContent = 'Scraping and formatting with Claude…';
    scrapeStatus.className = 'status-msg';
    document.getElementById('btn-scrape').disabled = true;

    try {
      const res = await fetch(`${FN_BASE}/scrape-url`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || data.message || 'Scrape failed.');

      const d = data.draft;
      document.getElementById('f-title').value    = d.title || '';
      document.getElementById('f-org').value      = d.organisation || '';
      document.getElementById('f-type').value     = d.type || 'jobs';
      document.getElementById('f-sector').value   = d.sector || SECTORS[0];
      document.getElementById('f-location').value = d.location || '';
      document.getElementById('f-country').value  = matchCountry(d.country);
      document.getElementById('f-deadline').value = d.deadline || '';
      document.getElementById('f-salary').value   = d.salary || 'Not specified';
      document.getElementById('f-apply').value    = d.apply_url || url;
      document.getElementById('f-desc').value     = d.description || '';
      document.getElementById('f-req').value      = d.requirements || '';

      document.getElementById('review-card').style.display = 'block';
      document.getElementById('review-card').scrollIntoView({ behavior: 'smooth' });
      scrapeStatus.textContent = 'Draft ready — review and edit below before publishing.';
      scrapeStatus.className = 'status-msg success';
    } catch (err) {
      scrapeStatus.textContent = err.message;
      scrapeStatus.className = 'status-msg error';
    } finally {
      document.getElementById('btn-scrape').disabled = false;
    }
  });

  document.getElementById('btn-skip-scrape').addEventListener('click', (e) => {
    e.preventDefault();
    const url = document.getElementById('scrape-url').value.trim();
    if (url) document.getElementById('f-apply').value = url;
    document.getElementById('review-card').style.display = 'block';
    document.getElementById('review-card').scrollIntoView({ behavior: 'smooth' });
    scrapeStatus.textContent = '';
  });

  const publishStatus = document.getElementById('publish-status');
  document.getElementById('btn-publish').addEventListener('click', async () => {
    const title   = document.getElementById('f-title').value.trim();
    const org     = document.getElementById('f-org').value.trim();
    const country = document.getElementById('f-country').value;
    const applyUrl = document.getElementById('f-apply').value.trim();

    if (!title || !org || !country || !applyUrl) {
      publishStatus.textContent = 'Title, organisation, country and apply URL are required.';
      publishStatus.className = 'status-msg error';
      return;
    }

    document.getElementById('btn-publish').disabled = true;
    publishStatus.textContent = 'Publishing…';
    publishStatus.className = 'status-msg';

    try {
      const res = await fetch(`${FN_BASE}/publish-admin-listing`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` },
        body: JSON.stringify({
          title, organisation: org,
          type:        document.getElementById('f-type').value,
          sector:      document.getElementById('f-sector').value,
          location:    document.getElementById('f-location').value.trim(),
          country,
          deadline:    document.getElementById('f-deadline').value || null,
          salary:      document.getElementById('f-salary').value.trim(),
          apply_url:   applyUrl,
          description: document.getElementById('f-desc').value.trim(),
          requirements: document.getElementById('f-req').value.trim(),
          contact_email: document.getElementById('f-contact').value.trim() || null,
          how_to_apply: document.getElementById('f-how-to-apply').value.trim() || null,
          paid_listing: document.getElementById('f-paid').checked,
        }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || data.message || 'Publish failed.');

      publishStatus.textContent = `Published — listing id ${data.id}. Live on opportunities.html now.`;
      publishStatus.className = 'status-msg success';
    } catch (err) {
      publishStatus.textContent = err.message;
      publishStatus.className = 'status-msg error';
    } finally {
      document.getElementById('btn-publish').disabled = false;
    }
  });
})();
</script>
</body>
</html>
