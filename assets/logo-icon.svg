<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="currentColor">
  <!--
    Afrorama sunrise logo.
    Structure (inside-out from centre):
      1. Filled dome          r = 0–43
      2. Arch ring (solid)    r = 43–53
      3. White gap            r = 53–58  (background shows through)
      4. Rays (11 wedges)     r = 58–96  (background shows between them)
      5. Outer arc stroke     r = 96
    Centre: (100, 120)
  -->
  <defs>
    <mask id="rlm">
      <!-- Show only the band between r=58 and r=96 -->
      <rect width="200" height="120" fill="black"/>
      <path d="M4,120 A96,96 0 0,1 196,120 Z" fill="white"/>
      <path d="M42,120 A58,58 0 0,1 158,120 Z" fill="black"/>
    </mask>
  </defs>

  <!-- Rays — 11 wedges, each 9 px wide, spaced 16° apart -->
  <g mask="url(#rlm)">
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(-80 100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(-64 100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(-48 100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(-32 100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(-16 100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(0   100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(16  100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(32  100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(48  100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(64  100 120)"/>
    <rect x="95.5" y="24" width="9" height="96" transform="rotate(80  100 120)"/>
  </g>

  <!-- Outer arc — thin ring giving a crisp outer boundary -->
  <path d="M4,120 A96,96 0 0,1 196,120 L190,120 A90,90 0 0,0 10,120 Z"/>

  <!-- Arch ring — solid band between r=43 and r=53 -->
  <path d="M47,120 A53,53 0 0,1 153,120 L157,120 A57,57 0 0,0 43,120 Z"/>

  <!-- Dome — filled solid semicircle r=43 -->
  <path d="M57,120 A43,43 0 0,1 143,120 Z"/>
</svg>
